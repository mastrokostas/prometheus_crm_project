{% extends 'base.html' %}
{% load static %}

{% block title %}
New Tenant
{% endblock title %}

{% block content %}
<h1>New Tenant</h1>
<br/>

<form method="POST" action="{% url 'add_tenant' %}">
    {% csrf_token %}
    {% comment %} {{ form.as_p }} {% endcomment %}
    {% for field in form %}
        <label class="required" style="color:red; font-size:10px;" for="{{ field.auto_id }}">{{ field.label }}</label>
        {{ field }}
    {% endfor %}
    <br/>
    <br/>
    <button type="submit" class="btn btn-success">
        Save New Tenant
    </button>
    <a href="{% url 'all_tenants' %}" class="btn btn-danger">Cancel</a>


</form>

{% endblock content %}
