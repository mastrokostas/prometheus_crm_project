{% extends "base.html" %}

{% block title %}
Edit Legal Team
{% endblock title %}

{% block content %}
<h1>Edit Legal Team</h1>

<form method="POST">
    {% csrf_token %}
    {% for field in form %}
        <label class="required" style="{% if field.field.required == True %}color:red;{% endif %}" for="{{ field.auto_id }}">{{ field.label }}</label>
        {{ field }}
        </br>
    {% endfor %}
    <br/>
    <button type="submit" class="btn btn-success">
        Update Record
    </button>
    <a href="{% url "legal" %}" class="btn btn-danger">Cancel</a>
</form>

{% endblock content %}
